name: 构建F4SE NPC信息显示插件
on:
  push:
    branches: [ main, master ]

jobs:
  build-f4se-plugin:
    runs-on: windows-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装XMake官方适配版本
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: 验证XMake安装状态
        run: xmake --version

      - name: 初始化XMake构建配置
        run: xmake f -c

      - name: 编译生成插件DLL
        run: xmake build -m release

      - name: 校验插件DLL生成状态
        run: if exist build/windows/x64/release/NPCInfoDisplay.dll (echo "插件构建成功") else (exit 1)

      - name: 上传生成的插件文件
        uses: actions/upload-artifact@v4
        with:
          name: NPC信息显示插件
          path: build/windows/x64/release/NPCInfoDisplay.dll
