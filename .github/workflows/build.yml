name: 构建F4SE NPC信息显示插件
on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # 支持手动触发构建

jobs:
  build-f4se-plugin:
    runs-on: windows-latest
    steps:
      - name: 拉取项目全量代码与子模块
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 安装XMake最新稳定版
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: 缓存XMake依赖包
        uses: actions/cache@v4
        with:
          path: ~/.xmake
          key: ${{ runner.os }}-xmake-cache-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-xmake-cache-

      - name: 初始化构建配置（自动确认所有依赖安装）
        run: xmake f -c -y

      - name: 编译Release正式版插件
        run: xmake build -m release -j $env:NUMBER_OF_PROCESSORS

      - name: 校验插件DLL生成结果
        run: if exist build/windows/x64/release/NPCInfoDisplay.dll (echo "插件构建成功") else (exit 1)

      - name: 上传生成的插件成品
        uses: actions/upload-artifact@v4
        with:
          name: NPC信息显示插件Release包
          path: build/windows/x64/release/NPCInfoDisplay.dll
