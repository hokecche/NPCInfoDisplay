name: 构建F4SE NPC信息显示插件
on:
  push:
    branches: [ main, master ]

jobs:
  build-f4se-plugin:
    runs-on: windows-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装XMake构建环境
        run: Invoke-Expression (Invoke-WebRequest 'https://cdn.jsdelivr.net/gh/xmake-io/xmake@master/scripts/get.ps1' -UseBasicParsing)

      - name: 编译生成Release版插件DLL
        run: xmake build -m release

      - name: 上传生成的插件成品
        uses: actions/upload-artifact@v4
        with:
          name: NPC信息显示插件
          path: build/windows/release/NPCInfoDisplay.dll
