name: 自动构建F4SE NPC信息显示插件
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      # 拉取项目代码，同步CommonLibF4子模块
      - name: 拉取项目代码与依赖子模块
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 安装官方最新版XMake构建工具
      - name: 部署XMake构建环境
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      # 验证XMake环境正常加载
      - name: 校验XMake安装状态
        run: xmake --version

      # 全量清理旧缓存，生成Release模式配置
      - name: 重置构建环境生成Release配置
        run: xmake f -m release -c -y

      # 执行正式编译生成插件DLL
      - name: 编译生成F4SE插件
        run: xmake build

      # 上传构建产物作为可下载资产
      - name: 导出编译完成的插件文件
        uses: actions/upload-artifact@v4
        with:
          name: NPC信息显示插件Release版
          path: build/windows/release/NPCInfoDisplay.dll
